# ==============================================================================
# GitHub Actions - Continuous Integration (CI)
# Checks structure, type-safety, and verifies build integrity.
# ==============================================================================

name: CI Verification

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  lint-and-validate:
    name: Code Validation & Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint and TypeScript Validation
        run: npm run lint

      - name: Production Build Compilation Check
        run: npm run build

